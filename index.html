
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMC Portal - Enterprise Workflow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dashboard-bg-url: url('/images/construction-bg.jpg');
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            color: #8aa0b2;
        }
        html {
            background-color: #0b1d36;
        }
        .theme-dark-bg {
            background:
              radial-gradient(1200px 600px at 70% 0%, rgba(255, 255, 255, 0.08) 0%, #FFFFFF0F 60%),
              linear-gradient(180deg, rgba(10,26,48,1) 0%, rgba(9,23,42,1) 35%, rgba(6,17,32,1) 100%);
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        .glass-card-light {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.15);
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.08);
        }
        .kpi-card {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
            transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
        }
        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.15);
        }
        .kpi-accent-orange {
            background: linear-gradient(135deg, #ff8a00 0%, #ff6a00 100%);
        }
        .muted {
            color: #64748b;
        }
        .text-contrast {
            color: #cbd5e1;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .nav-dark {
            background: rgba(6, 17, 32, 0.98);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-right: 1px solid rgba(255,255,255,0.12);
        }
        .nav-light {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-right: 1px solid rgba(0,0,0,0.12);
        }
        .active-pill {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .active-pill-light {
            background: #eef2ff;
            color: #4338ca;
            border: 1px solid #c7d2fe;
        }
        .status-badge {
            color: #8fe3b1;
        }
        .status-badge-white {
            color: #ffffff;
            opacity: 0.9;
        }
        .hero-bg{
            position:absolute;
            inset:0;
            background:
              linear-gradient(180deg, rgba(11,29,54,0.10) 0%, rgba(11,29,54,0.65) 55%, rgba(11,29,54,0.95) 100%),
              var(--dashboard-bg-url);
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            opacity: 0.95;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.06);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.18);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.28);
        }

        /* Global Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-in-right {
            animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-in-left {
            animation: slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-entrance {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }

        /* Native <select> popup: match dark UI (esp. Windows/Chrome white list) */
        select.dpr-review-select {
            color-scheme: dark;
        }
        select.dpr-review-select option {
            background-color: #0f172a;
            color: #cbd5e1;
        }
    </style>

</script>
</head>

</body>
</html>
